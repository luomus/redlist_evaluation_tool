apiVersion: v1
kind: Template
metadata:
  name: redlist-template
  annotations:
    description: "Template to deploy the red list evaluation app (web + PostGIS) on OpenShift"
parameters:
  - name: NAME
    description: Name prefix for resources
    required: true
    value: redlist
  - name: APP_IMAGE
    description: Docker image for the web app
    required: true
    value: 'ghcr.io/luomus/redlist_evaluation_tool:latest'
  - name: DB_HOST
    description: External database host
    value: external-db.example.com
  - name: DB_PORT
    description: External database port
    value: "5432"
  - name: DB_NAME
    description: External database name
    value: redlist
  - name: DB_USER
    description: External database username
    value: redlist
  - name: DB_PASSWORD
    description: External database password
    value: your-secure-password
  - name: MML_API_KEY
    description: API key for the MML API (optional)
    value: your-mml-api-key
  - name: LAJIAUTH_URL
    value: https://fmnh-ws-test-24.it.helsinki.fi/laji-auth/
  - name: TARGET
    value: KE.1721
  - name: SECRET_KEY
    value: your-secret-key
  - name: LAJI_API_BASE_URL
    value: 'https://apitest.laji.fi/warehouse/private-query/unit/list'
  - name: LAJI_API_ACCESS_TOKEN
    value: your-laji-api-access-token



objects:

  - apiVersion: apps/v1
    kind: Deployment
    metadata:
      name: ${NAME}
      labels:
        app: ${NAME}
        role: web
    spec:
      replicas: 1
      selector:
        matchLabels:
          app: ${NAME}
          role: web
      template:
        metadata:
          labels:
            app: ${NAME}
            role: web
        spec:
          containers:
            - name: ${NAME}
              image: ${APP_IMAGE}
              ports:
                - containerPort: 5000
              env:
                - name: PYTHONUNBUFFERED
                  value: "1"
                - name: DATABASE_URL
                  value: "postgresql://${DB_USER}:${DB_PASSWORD}@${DB_HOST}:${DB_PORT}/${DB_NAME}"
                - name: MML_API_KEY
                  value: "${MML_API_KEY}"
                - name: LAJIAUTH_URL
                  value: "${LAJIAUTH_URL}"
                - name: TARGET
                  value: "${TARGET}"
                - name: SECRET_KEY
                  value: "${SECRET_KEY}"
                - name: LAJI_API_BASE_URL
                  value: "${LAJI_API_BASE_URL}"
                - name: LAJI_API_ACCESS_TOKEN
                  value: "${LAJI_API_ACCESS_TOKEN}"

  - apiVersion: v1
    kind: Service
    metadata:
      name: ${NAME}-svc
      labels:
        app: ${NAME}
        role: web
    spec:
      ports:
        - port: 5000
          targetPort: 5000
          protocol: TCP
      selector:
        app: ${NAME}
        role: web

  - apiVersion: route.openshift.io/v1
    kind: Route
    metadata:
      name: ${NAME}
      labels:
        app: ${NAME}
    spec:
      to:
        kind: Service
        name: ${NAME}-svc
      port:
        targetPort: 5000
      tls:
        termination: edge
        insecureEdgeTerminationPolicy: Allow

objectsCount: 5
