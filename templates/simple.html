<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Red List Tool — Eliöryhmien hallinta</title>
    <link rel="stylesheet" href="/static/css/search.css">
    <link rel="stylesheet" href="/static/css/simple.css">
    <link rel="stylesheet" href="/static/css/hierarchy.css">
    <style>
        h1 {
            color: #2c3e50;
            font-size: 32px;
            margin-bottom: 10px;
            text-align: center;
            background: linear-gradient(135deg, #3498db, #2c3e50);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .subtitle {
            text-align: center;
            color: #7f8c8d;
            font-size: 16px;
            margin-bottom: 30px;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Logo -->
        <div style="text-align:center; margin-bottom:10px;">
            <a href="https://laji.fi" target="_blank" rel="noopener noreferrer">
                <img src="/static/resources/Laji_fi_logo-1024x408.png" alt="laji.fi logo" style="max-width:200px; width:40%; height:auto;">
            </a>
        </div>

        <!-- User info & logout -->
        <div style="text-align:right; margin-bottom:10px;">
            <div id="userInfo" style="display:inline-block; margin-right:15px; color:#555; font-size:14px; text-align:right; line-height:1.4;"></div>
            <a href="/logout" class="btn-small" style="text-decoration:none; vertical-align:top;">Kirjaudu ulos</a>
        </div>

        <h1>Red List -arviointityökalu</h1>
        <div class="subtitle">Laske levinneisyysalueita (EOO) ja esiintymisalueita (AOO) IUCN Punaisen listan eri lajeille</div>

        <!-- Hierarchy browser -->
        <div class="section">
            <h2>Eliöryhmät</h2>
            <p style="color: #7f8c8d; margin-bottom: 15px; line-height: 1.6;">
                Selaa eliöryhmiä, lisää lajeja ja hallinnoi havaintoaineistoja.
            </p>
            <div class="search-bar-wrapper">
                <input type="search" id="hierarchy-search" placeholder="Hae lajia tai eliöryhmää…" autocomplete="off" onkeydown="if(event.key==='Enter') doHierarchySearch()" oninput="if(this.value==='') doHierarchySearch()">
                <button class="btn-small btn-search" onclick="doHierarchySearch()">Hae</button>
                <span class="search-result-count" id="search-result-count"></span>
            </div>
            <div id="hierarchy-container">Ladataan…</div>
        </div>

        <div id="error" class="error" style="display: none;"></div>
    </div>

    <!-- Add-species modal -->
    <div id="add-species-modal" class="modal-overlay">
        <div class="modal-box">
            <h3>Lisää uusi laji ryhmään <span id="modal-taxon-name"></span></h3>
            <div class="input-group">
                <label>Lajin nimi:</label>
                <input type="text" id="modal-species-name" placeholder="Esim. Ketunleipä">
            </div>
            <div class="input-group">
                <label>Kuvaus (valinnainen):</label>
                <textarea id="modal-species-desc" rows="3" style="width:100%;"></textarea>
            </div>
            <div style="text-align:right; margin-top:15px;">
                <button onclick="closeAddSpeciesModal()" class="btn-small">Peruuta</button>
                <button onclick="submitAddSpecies()" class="btn-small btn-primary">Luo laji</button>
            </div>
        </div>
    </div>

    <script src="/static/js/fetch_data.js"></script>
    <script src="/static/js/hierarchy.js"></script>
    <script src="/static/js/simple.js"></script>
</body>
</html>
